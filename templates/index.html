<!DOCTYPE html>
<h1>Run Control</h1>
<p>Run number: {{ run_number }}</p>
{% if is_running %}
    <p>Run is running</p>
{% else %}
    <p>Run is not running</p>
{% endif %}
<form class="form-inline" method="POST" action="/">
    <input type="submit" name="start" value="Start Run" class="btn btn-primary">
    <input type="submit" name="stop" value="Stop Run" class="btn btn-primary">
</form>
